server:
  port: 0
spring:
  sql:
    init:
      mode: always
  datasource:
    url: jdbc:postgresql://localhost:5434/commerce
    username: commerce_user
    password: commerce_pass
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
